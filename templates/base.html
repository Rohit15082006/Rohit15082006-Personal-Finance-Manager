<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Personal Finance Manager{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-lg">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-wallet2"></i> Finance Manager
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                            <i class="bi bi-house"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/expenses' %}active{% endif %}" href="/expenses">
                            <i class="bi bi-credit-card"></i> Expenses
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/budgets' %}active{% endif %}" href="/budgets">
                            <i class="bi bi-piggy-bank"></i> Budgets
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/investments' %}active{% endif %}" href="/investments">
                            <i class="bi bi-graph-up"></i> Investments
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/savings' %}active{% endif %}" href="/savings">
                            <i class="bi bi-safe"></i> Savings
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/reports' %}active{% endif %}" href="/reports">
                            <i class="bi bi-bar-chart"></i> Reports
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/trips' %}active{% endif %}" href="/trips">
                            <i class="bi bi-airplane"></i> Trip Splitter
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-lg py-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2024 Personal Finance Manager. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
