{% extends "base.html" %}

{% block title %}Budgets - Personal Finance Manager{% endblock %}

{% block content %}
<h1 class="mb-4">
    <i class="bi bi-piggy-bank"></i> Set Budgets
</h1>

<!-- Add Budget Card -->
<div class="card mb-4 border-0 shadow-sm">
    <div class="card-header bg-gradient text-white">
        <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Create Budget</h5>
    </div>
    <div class="card-body">
        <form id="budgetForm">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="budgetCategory" class="form-label">Category *</label>
                    <select class="form-select" id="budgetCategory" name="category" required>
                        <option value="">Select Category</option>
                        <option value="Food">Food</option>
                        <option value="Transportation">Transportation</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="budgetAmount" class="form-label">Amount *</label>
                    <input type="number" class="form-control" id="budgetAmount" name="amount" placeholder="0.00" step="0.01" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="budgetPeriod" class="form-label">Period *</label>
                    <select class="form-select" id="budgetPeriod" name="period" required>
                        <option value="monthly">Monthly</option>
                        <option value="yearly">Yearly</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-success">
                <i class="bi bi-check-circle"></i> Set Budget
            </button>
        </form>
    </div>
</div>

<!-- Budgets Display -->
<div class="row" id="budgetsContainer">
    <div class="col-12 text-center text-muted py-4">
        <p>Loading budgets...</p>
    </div>
</div>

<!-- Alert Messages -->
<div id="alertContainer" class="mt-3"></div>

{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    loadBudgets();
    
    document.getElementById('budgetForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const formData = {
            category: document.getElementById('budgetCategory').value,
            amount: parseFloat(document.getElementById('budgetAmount').value),
            period: document.getElementById('budgetPeriod').value
        };
        
        fetch('/api/add-budget', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                showAlert('Budget set successfully!', 'success');
                document.getElementById('budgetForm').reset();
                loadBudgets();
            } else {
                showAlert('Error: ' + data.error, 'danger');
            }
        })
        .catch(error => showAlert('Error: ' + error.message, 'danger'));
    });
});

function loadBudgets() {
    fetch('/api/get-data')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('budgetsContainer');
            
            if (Object.keys(data.budgets).length === 0) {
                container.innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-info text-center">
                            <i class="bi bi-info-circle"></i> No budgets set yet. Create one above!
                        </div>
                    </div>
                `;
                return;
            }
            
            const expensesByCategory = {};
            data.expenses.forEach(e => {
                const category = e[1];
                const amount = parseFloat(e[0]);
                expensesByCategory[category] = (expensesByCategory[category] || 0) + amount;
            });

            const html = Object.entries(data.budgets).map(([category, budget]) => {
                const actual = expensesByCategory[category] || 0;
                const budgetAmount = parseFloat(budget.amount);
                const percentage = (actual / budgetAmount) * 100;
                const remaining = budgetAmount - actual;
                const progressColor = percentage > 100 ? 'bg-danger' : percentage > 80 ? 'bg-warning' : 'bg-success';
                
                return `
                    <div class="col-md-6 col-lg-4 mb-3">
                        <div class="card h-100 border-0 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <h5 class="card-title">${category}</h5>
                                    <span class="badge bg-secondary">${budget.period}</span>
                                </div>
                                <p class="card-text text-muted mb-2">Budget Limit</p>
                                <h3 class="mb-3">₹${budgetAmount.toFixed(2)}</h3>
                                <div class="progress">
                                    <div class="progress-bar ${progressColor}" style="width: ${Math.min(percentage, 100)}%"></div>
                                </div>
                                <small class="text-muted">${Math.round(percentage)}% of budget used</small>
                            </div>
                            <div class="card-footer bg-light border-0">
                                <div class="d-flex justify-content-between">
                                    <small>Spent: <strong>₹${actual.toFixed(2)}</strong></small>
                                    <small>Remaining: <strong>₹${remaining.toFixed(2)}</strong></small>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            container.innerHTML = html;
        });
}

function showAlert(message, type) {
    const alertContainer = document.getElementById('alertContainer');
    const alertDiv = document.createElement('div');
    alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
    alertDiv.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;
    alertContainer.innerHTML = '';
    alertContainer.appendChild(alertDiv);
    
    setTimeout(() => {
        alertDiv.remove();
    }, 5000);
}
</script>
{% endblock %}
