{% extends "base.html" %}

{% block title %}Expenses - Personal Finance Manager{% endblock %}

{% block content %}
<h1 class="mb-4">
    <i class="bi bi-credit-card"></i> Manage Expenses
</h1>

<!-- Add Expense Card -->
<div class="card mb-4 border-0 shadow-sm">
    <div class="card-header bg-gradient text-white">
        <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Add New Expense</h5>
    </div>
    <div class="card-body">
        <form id="expenseForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="amount" class="form-label">Amount *</label>
                    <input type="number" class="form-control" id="amount" name="amount" placeholder="0.00" step="0.01" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="category" class="form-label">Category *</label>
                    <select class="form-select" id="category" name="category" required>
                        <option value="">Select Category</option>
                        <option value="Food">Food</option>
                        <option value="Transportation">Transportation</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="date" class="form-label">Date *</label>
                    <input type="date" class="form-control" id="date" name="date" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="description" class="form-label">Description</label>
                    <input type="text" class="form-control" id="description" name="description" placeholder="Add a note...">
                </div>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-circle"></i> Add Expense
            </button>
        </form>
    </div>
</div>

<!-- Expenses List -->
<div class="card border-0 shadow-sm">
    <div class="card-header bg-light">
        <h5 class="mb-0"><i class="bi bi-list"></i> Expense History</h5>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th><i class="bi bi-currency-rupee"></i> Amount</th>
                        <th><i class="bi bi-tag"></i> Category</th>
                        <th><i class="bi bi-calendar-event"></i> Date</th>
                        <th><i class="bi bi-chat"></i> Description</th>
                    </tr>
                </thead>
                <tbody id="expensesList">
                    <tr>
                        <td colspan="4" class="text-center text-muted py-3">Loading expenses...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Alert Messages -->
<div id="alertContainer" class="mt-3"></div>

{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Set today's date
    document.getElementById('date').valueAsDate = new Date();
    
    // Load expenses
    loadExpenses();
    
    // Form submission
    document.getElementById('expenseForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const formData = {
            amount: parseFloat(document.getElementById('amount').value),
            category: document.getElementById('category').value,
            date: document.getElementById('date').value,
            description: document.getElementById('description').value
        };
        
        fetch('/api/add-expense', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                showAlert('Expense added successfully!', 'success');
                document.getElementById('expenseForm').reset();
                document.getElementById('date').valueAsDate = new Date();
                loadExpenses();
            } else {
                showAlert('Error: ' + data.error, 'danger');
            }
        })
        .catch(error => showAlert('Error: ' + error.message, 'danger'));
    });
});

function loadExpenses() {
    fetch('/api/get-data')
        .then(response => response.json())
        .then(data => {
            const tbody = document.getElementById('expensesList');
            if (data.expenses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-3">No expenses yet</td></tr>';
                return;
            }
            
            tbody.innerHTML = data.expenses.map(e => `
                <tr>
                    <td><strong class="text-danger">₹${parseFloat(e[0]).toFixed(2)}</strong></td>
                    <td><span class="badge bg-secondary">${e[1]}</span></td>
                    <td>${e[2]}</td>
                    <td><small class="text-muted">${e[3]}</small></td>
                </tr>
            `).join('');
        });
}

function showAlert(message, type) {
    const alertContainer = document.getElementById('alertContainer');
    const alertDiv = document.createElement('div');
    alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
    alertDiv.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;
    alertContainer.innerHTML = '';
    alertContainer.appendChild(alertDiv);
    
    setTimeout(() => {
        alertDiv.remove();
    }, 5000);
}
</script>
{% endblock %}
